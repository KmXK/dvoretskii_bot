- id: alias_resolution
  description: |
    Speaker uses an alias; model must canonicalize to display_name.
    Directory has Кирилл with aliases [Кир, Кирыч].
    Expected: model emits 'Кирилл' as creditor, NOT 'Кир'.
  persons:
    - {name: Кирилл, aliases: [Кир, Кирыч]}
    - {name: Дима}
    - {name: Егор}
  context: |
    Дима пишет: Кир купил пиццу за 30 рублей, поделили на троих со мной и Егором.
  expected:
    currency: BYN
    items:
      - name_contains: пицц
        creditor: Кирилл
        per_person_minor:
          Кирилл: 1000
          Дима: 1000
          Егор: 1000
  tags: [directory, alias]

- id: negative_phrasing
  description: speaker excludes someone explicitly — "Дима ничего не пил"
  speaker: Кирилл
  persons:
    - {name: Кирилл}
    - {name: Дима}
    - {name: Егор}
    - {name: Паша}
  context: |
    Дима ничего не пил, не любит. Остальные трое — я, Егор и Паша — скинулись на бутылку 60 рублей.
    Платил Паша.
  expected:
    currency: BYN
    items:
      - name_contains: бутыл
        creditor: Паша
        per_person_minor:
          Кирилл: 2000
          Егор: 2000
          Паша: 2000
  tags: [realistic, negative]

- id: conflicting_amounts
  description: |
    Voice says "сорок", photo line shows "45.00". Documented expected behavior:
    model picks ONE (preferably the photo as more authoritative) OR emits
    a [ВОПРОСЫ] entry asking which is correct. Penalize only if both items
    are emitted as separate rows.
    We accept either price 4000 or 4500 minor units.
  speaker: Кирилл
  persons:
    - {name: Кирилл}
    - {name: Дима}
  context: |
    [Голосовое — Кирилл] Сходили на пиво, было сорок рублей.
    [Фото — чек]
    Beer Co.
    Пиво крафтовое   45.00
    Итого           45.00
    Поделили с Димой пополам, платил я.
  expected:
    currency: BYN
    items:
      - name_contains: пив
        creditor: Кирилл
        unit_price_minor_options: [4000, 4500]
  tags: [edge, conflict]

- id: ocr_dense_receipt
  description: dense OCR with many service lines, totals, taxes — only 2 real items
  speaker: Кирилл
  persons:
    - {name: Кирилл}
    - {name: Дима}
  context: |
    [Фото — чек]
    ООО "Кафе"
    УНП 123456789
    Чек № 88321
    Дата: 02.05.2026 19:42
    Кассир: Иванов И.И.
    --------------------
    Лазанья                           22.00
    Капучино                           8.00
