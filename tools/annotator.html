<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BBox Annotator</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #1a1a1a; color: #eee; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; font-size: 13px; }
  .container { max-width: 1100px; margin: 0 auto; padding: 16px; }
  h2 { margin: 0 0 12px; font-weight: 500; }

  .drop-zone { border: 2px dashed #444; padding: 18px; text-align: center; border-radius: 8px; margin-bottom: 12px; cursor: pointer; transition: 0.15s; }
  .drop-zone.drag-over { border-color: #4a9eff; background: #1e2a3a; }
  .drop-zone .hint { color: #888; font-size: 11px; margin-top: 4px; }

  .canvas-wrap { position: relative; background: #000; display: inline-block; max-width: 100%; }
  canvas { display: block; max-width: 100%; height: auto; cursor: crosshair; user-select: none; }

  .timeline { position: relative; height: 28px; background: #2a2a2a; margin-top: 8px; cursor: pointer; border-radius: 4px; user-select: none; }
  .timeline-bar { position: absolute; top: 0; bottom: 0; left: 0; background: #4a9eff; opacity: 0.18; pointer-events: none; }
  .timeline-cursor { position: absolute; top: -2px; bottom: -2px; width: 2px; background: #fff; pointer-events: none; }
  .keyframe-marker { position: absolute; top: 2px; bottom: 2px; width: 3px; pointer-events: none; border-radius: 1px; }
  .keyframe-marker.a { background: #ff4a4a; }
  .keyframe-marker.b { background: #4ade80; }

  .controls { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; align-items: center; }
  button { background: #2d2d2d; color: #eee; border: 1px solid #444; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; font-family: inherit; }
  button:hover { background: #3a3a3a; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.active { background: #4a9eff; border-color: #4a9eff; color: #fff; }
  button.char-a.active { background: #ff4a4a; border-color: #ff4a4a; }
  button.char-b.active { background: #4ade80; border-color: #4ade80; color: #111; }
  input[type=number] { background: #2d2d2d; color: #eee; border: 1px solid #444; padding: 5px 8px; border-radius: 5px; font-family: inherit; width: 70px; }

  .info { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; color: #888; margin-left: auto; }
  .help { font-size: 11px; color: #777; margin-top: 10px; line-height: 1.6; }
  kbd { background: #2d2d2d; padding: 1px 5px; border-radius: 3px; font-size: 10px; font-family: ui-monospace, monospace; border: 1px solid #444; }

  .status { margin-top: 6px; font-size: 11px; color: #666; }
  .err { color: #ff6464; }
</style>
</head>
<body>
<div class="container">
  <h2>BBox Annotator</h2>

  <div id="dropZone" class="drop-zone">
    Drop video (mp4/webm/mov), GIF or animated WebP here, or click to choose
    <div class="hint">Two bboxes A &amp; B, keyframes + linear interpolation, JSON export</div>
  </div>

  <div id="workspace" style="display:none">
    <div class="canvas-wrap"><canvas id="cv"></canvas></div>
    <div id="timeline" class="timeline">
      <div id="timelineBar" class="timeline-bar"></div>
      <div id="timelineCursor" class="timeline-cursor"></div>
    </div>
    <div class="controls">
      <button id="playBtn">Play</button>
      <button id="prevBtn" title="Prev frame">◀</button>
      <button id="nextBtn" title="Next frame">▶</button>
      <button id="activeA" class="char-a active">A</button>
      <button id="activeB" class="char-b">B</button>
      <button id="addKf">+ Keyframe</button>
      <button id="delKf">− Keyframe</button>
      <label style="font-size:11px;color:#888">w <input id="wInput" type="number" min="2" step="1" style="width:60px"></label>
      <label style="font-size:11px;color:#888">h <input id="hInput" type="number" min="2" step="1" style="width:60px"></label>
      <button id="applySizeAll" title="Apply current W×H to all keyframes of active character">size→all</button>
      <label style="font-size:11px;color:#888">fps <input id="fpsInput" type="number" min="1" max="120" step="0.01" value="30"></label>
      <button id="exportBtn">Export JSON</button>
      <span id="info" class="info"></span>
    </div>
    <div class="help">
      <kbd>Space</kbd> play/pause &nbsp;
      <kbd>←</kbd>/<kbd>→</kbd> ±1 frame &nbsp;
      <kbd>⇧←</kbd>/<kbd>⇧→</kbd> ±10 frames &nbsp;
      <kbd>Tab</kbd> switch A/B &nbsp;
      <kbd>K</kbd> add keyframe &nbsp;
      <kbd>⌫</kbd> remove keyframe &nbsp;
      <kbd>1</kbd>/<kbd>2</kbd> jump prev/next keyframe (active)
    </div>
    <div id="status" class="status"></div>
  </div>
</div>

<script type="module">
import { parseGIF, decompressFrames } from 'https://cdn.jsdelivr.net/npm/gifuct-js@2.1.2/+esm';

const COLORS = { a: '#ff4a4a', b: '#4ade80' };

// ===== Source abstractions =====

class VideoSource {
  constructor(file) { this.file = file; this.kind = 'video'; }
  async load() {
    this.url = URL.createObjectURL(this.file);
    this.video = document.createElement('video');
    this.video.src = this.url;
    this.video.muted = true;
    this.video.playsInline = true;
    await new Promise((res, rej) => {
      this.video.onloadedmetadata = res;
      this.video.onerror = () => rej(new Error('Failed to load video'));
    });
    this.width = this.video.videoWidth;
    this.height = this.video.videoHeight;
    this.duration = this.video.duration;
    this.fps = 30;
    this.frames = Math.round(this.duration * this.fps);
  }
  setFps(fps) { this.fps = fps; this.frames = Math.round(this.duration * fps); }
  async seek(t) {
    t = Math.max(0, Math.min(this.duration - 1e-6, t));
    if (Math.abs(this.video.currentTime - t) < 1e-4) return;
    return new Promise(res => {
      const onSeeked = () => { this.video.removeEventListener('seeked', onSeeked); res(); };
      this.video.addEventListener('seeked', onSeeked);
      this.video.currentTime = t;
    });
  }
  draw(ctx) { ctx.drawImage(this.video, 0, 0, this.width, this.height); }
  play() { return this.video.play(); }
  pause() { this.video.pause(); }
  get currentTime() { return this.video.currentTime; }
  get isPaused() { return this.video.paused; }
}

// Base class for frame-array sources (gif, webp): subclass implements load() and populates this.frameData
class FrameArraySource {
  constructor(file, kind) { this.file = file; this.kind = kind; this._t = 0; this._playing = false; }
  setFps(_fps) { /* derived from frame delays */ }
  _finalize() {
    const fd = this.frameData;
    this.duration = fd.length ? fd[fd.length - 1].t + fd[fd.length - 1].delay : 0;
    this.frames = fd.length;
    this.fps = this.duration > 0 ? this.frames / this.duration : 0;
  }
  _frameIdxAt(t) {
    const fd = this.frameData;
    if (!fd.length) return 0;
    if (t <= 0) return 0;
    if (t >= this.duration) return fd.length - 1;
    let lo = 0, hi = fd.length - 1;
    while (lo < hi) {
      const mid = (lo + hi + 1) >> 1;
      if (fd[mid].t <= t) lo = mid; else hi = mid - 1;
    }
    return lo;
  }
  async seek(t) { this._t = Math.max(0, Math.min(this.duration, t)); }
  draw(ctx) {
    const f = this.frameData[this._frameIdxAt(this._t)];
    if (f) ctx.drawImage(f.bitmap, 0, 0);
  }
  async play() {
    if (this._playing || this.duration <= 0) return;
    this._playing = true;
    const startPerf = performance.now() - this._t * 1000;
    const tick = () => {
      if (!this._playing) return;
      const elapsed = (performance.now() - startPerf) / 1000;
      this._t = elapsed % this.duration;
      render();
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }
  pause() { this._playing = false; }
  get currentTime() { return this._t; }
  get isPaused() { return !this._playing; }
}

class GifSource extends FrameArraySource {
  constructor(file) { super(file, 'gif'); }
  async load() {
    const buf = await this.file.arrayBuffer();
    const gif = parseGIF(buf);
    const decompressed = decompressFrames(gif, true);
    if (decompressed.length === 0) throw new Error('GIF has no frames');
    this.width = gif.lsd.width;
    this.height = gif.lsd.height;

    const off = document.createElement('canvas');
    off.width = this.width; off.height = this.height;
    const offCtx = off.getContext('2d');

    const patchCanvas = document.createElement('canvas');
    const patchCtx = patchCanvas.getContext('2d');

    this.frameData = [];
    let cumMs = 0;
    for (const f of decompressed) {
      const before = offCtx.getImageData(0, 0, this.width, this.height);

      patchCanvas.width = f.dims.width;
      patchCanvas.height = f.dims.height;
      const pd = patchCtx.createImageData(f.dims.width, f.dims.height);
      pd.data.set(f.patch);
      patchCtx.putImageData(pd, 0, 0);
      offCtx.drawImage(patchCanvas, f.dims.left, f.dims.top);

      const bitmap = await createImageBitmap(off);
      const delayMs = f.delay || 100;
      this.frameData.push({ bitmap, t: cumMs / 1000, delay: delayMs / 1000 });
      cumMs += delayMs;

      if (f.disposalType === 2) {
        offCtx.clearRect(f.dims.left, f.dims.top, f.dims.width, f.dims.height);
      } else if (f.disposalType === 3) {
        offCtx.putImageData(before, 0, 0);
      }
    }
    this._finalize();
  }
}

class WebpSource extends FrameArraySource {
  constructor(file) { super(file, 'webp'); }
  async load() {
    if (typeof ImageDecoder === 'undefined') {
      throw new Error('ImageDecoder API not supported — use Chrome 94+ or Safari 17+');
    }
    const mime = this.file.type || 'image/webp';
    if (!(await ImageDecoder.isTypeSupported(mime))) {
      throw new Error('Browser cannot decode ' + mime);
    }
    const decoder = new ImageDecoder({ data: this.file.stream(), type: mime });
    await decoder.completed;

    const track = decoder.tracks.selectedTrack;
    const frameCount = track ? track.frameCount : 1;
    if (!frameCount) throw new Error('WebP has no frames');

    this.frameData = [];
    let cumUs = 0;
    for (let i = 0; i < frameCount; i++) {
      const result = await decoder.decode({ frameIndex: i });
      const vf = result.image;
      if (i === 0) { this.width = vf.displayWidth; this.height = vf.displayHeight; }
      const durationUs = vf.duration || 100000;
      const bitmap = await createImageBitmap(vf);
      vf.close();
      this.frameData.push({ bitmap, t: cumUs / 1e6, delay: durationUs / 1e6 });
      cumUs += durationUs;
    }
    decoder.close();
    this._finalize();
    if (this.duration === 0) {
      // static webp single-frame fallback
      this.duration = 1;
      this.frameData[0].delay = 1;
      this._finalize();
    }
  }
}

// ===== State =====

const app = {
  source: null,
  canvas: document.getElementById('cv'),
  ctx: null,
  keyframes: { a: [], b: [] },
  active: 'a',
  bbox: { a: null, b: null },
  dragging: null,
};
app.ctx = app.canvas.getContext('2d');

// ===== Interpolation =====

function lerp(a, b, r) { return a + (b - a) * r; }

function interpolate(kfs, t) {
  if (kfs.length === 0) return null;
  if (t <= kfs[0].t) return { t, x: kfs[0].x, y: kfs[0].y, w: kfs[0].w, h: kfs[0].h };
  if (t >= kfs[kfs.length - 1].t) {
    const k = kfs[kfs.length - 1];
    return { t, x: k.x, y: k.y, w: k.w, h: k.h };
  }
  for (let i = 0; i < kfs.length - 1; i++) {
    if (t >= kfs[i].t && t <= kfs[i+1].t) {
      const span = kfs[i+1].t - kfs[i].t;
      const r = span > 0 ? (t - kfs[i].t) / span : 0;
      return {
        t,
        x: lerp(kfs[i].x, kfs[i+1].x, r),
        y: lerp(kfs[i].y, kfs[i+1].y, r),
        w: lerp(kfs[i].w, kfs[i+1].w, r),
        h: lerp(kfs[i].h, kfs[i+1].h, r),
      };
    }
  }
  return null;
}

function keyTolerance() { return 1 / (app.source.fps || 30) / 2.5; }

function findKeyframeAt(ch, t) {
  const tol = keyTolerance();
  return app.keyframes[ch].findIndex(k => Math.abs(k.t - t) < tol);
}

function upsertKeyframe(ch, box) {
  const t = app.source.currentTime;
  const entry = { t, x: round(box.x), y: round(box.y), w: round(box.w), h: round(box.h) };
  const idx = findKeyframeAt(ch, t);
  if (idx >= 0) app.keyframes[ch][idx] = entry;
  else {
    app.keyframes[ch].push(entry);
    app.keyframes[ch].sort((a, b) => a.t - b.t);
  }
}

function removeKeyframeAt(ch) {
  const idx = findKeyframeAt(ch, app.source.currentTime);
  if (idx >= 0) app.keyframes[ch].splice(idx, 1);
}

function round(v) { return Math.round(v * 100) / 100; }

function updateBboxes() {
  for (const ch of ['a', 'b']) {
    if (app.dragging && app.dragging.ch === ch) continue;
    const interp = interpolate(app.keyframes[ch], app.source.currentTime);
    if (interp) {
      app.bbox[ch] = interp;
    } else if (!app.bbox[ch]) {
      const w = app.source.width, h = app.source.height;
      const size = Math.min(w, h) * 0.18;
      app.bbox[ch] = {
        x: ch === 'a' ? w * 0.25 - size/2 : w * 0.65 - size/2,
        y: h * 0.35,
        w: size, h: size,
      };
    }
  }
}

// ===== Rendering =====

function render() {
  if (!app.source) return;
  const { ctx, canvas } = app;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  app.source.draw(ctx);
  updateBboxes();

  for (const ch of ['a', 'b']) {
    const b = app.bbox[ch];
    if (!b) continue;
    const isActive = ch === app.active;
    ctx.strokeStyle = COLORS[ch];
    ctx.lineWidth = isActive ? 3 : 2;
    ctx.strokeRect(b.x, b.y, b.w, b.h);

    ctx.fillStyle = COLORS[ch];
    ctx.font = 'bold 14px -apple-system, sans-serif';
    ctx.fillText(ch.toUpperCase(), b.x + 4, b.y + 16);

    if (isActive) {
      const s = 8;
      const cx = b.x + b.w / 2, cy = b.y + b.h / 2;
      const handles = [
        [b.x, b.y], [b.x + b.w, b.y], [b.x, b.y + b.h], [b.x + b.w, b.y + b.h],
        [cx, b.y], [cx, b.y + b.h], [b.x, cy], [b.x + b.w, cy],
      ];
      for (const [px, py] of handles) {
        ctx.fillStyle = COLORS[ch];
        ctx.fillRect(px - s/2, py - s/2, s, s);
      }
    }

    if (findKeyframeAt(ch, app.source.currentTime) >= 0) {
      ctx.fillStyle = COLORS[ch];
      ctx.beginPath();
      ctx.arc(b.x + b.w - 7, b.y + 7, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(b.x + b.w - 7, b.y + 7, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  updateTimeline();
  updateInfo();
}

function updateTimeline() {
  const tl = document.getElementById('timeline');
  const cursor = document.getElementById('timelineCursor');
  const bar = document.getElementById('timelineBar');
  const w = tl.offsetWidth;
  const ratio = app.source.duration > 0 ? app.source.currentTime / app.source.duration : 0;
  cursor.style.left = (ratio * w) + 'px';
  bar.style.width = (ratio * w) + 'px';

  for (const m of tl.querySelectorAll('.keyframe-marker')) m.remove();
  for (const ch of ['a', 'b']) {
    for (const kf of app.keyframes[ch]) {
      const m = document.createElement('div');
      m.className = 'keyframe-marker ' + ch;
      m.style.left = (kf.t / app.source.duration * w) + 'px';
      tl.appendChild(m);
    }
  }
}

function updateInfo() {
  const t = app.source.currentTime;
  const frame = Math.round(t * app.source.fps);
  document.getElementById('info').textContent =
    `t=${t.toFixed(3)}s  frame ${frame}/${app.source.frames}  fps=${app.source.fps.toFixed(2)}  A:${app.keyframes.a.length} B:${app.keyframes.b.length}`;
  syncSizeInputs();
}

function syncSizeInputs() {
  const b = app.bbox[app.active];
  if (!b) return;
  const wEl = document.getElementById('wInput');
  const hEl = document.getElementById('hInput');
  if (document.activeElement !== wEl) wEl.value = Math.round(b.w);
  if (document.activeElement !== hEl) hEl.value = Math.round(b.h);
}

// ===== Mouse on canvas =====

function getCanvasCoords(e) {
  const rect = app.canvas.getBoundingClientRect();
  const scaleX = app.canvas.width / rect.width;
  const scaleY = app.canvas.height / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY,
  };
}

function hitTest(box, x, y) {
  const s = 14;
  const nearX = (xx) => Math.abs(x - xx) < s;
  const nearY = (yy) => Math.abs(y - yy) < s;
  const cx = box.x + box.w / 2, cy = box.y + box.h / 2;
  if (nearX(box.x) && nearY(box.y)) return 'nw';
  if (nearX(box.x + box.w) && nearY(box.y)) return 'ne';
  if (nearX(box.x) && nearY(box.y + box.h)) return 'sw';
  if (nearX(box.x + box.w) && nearY(box.y + box.h)) return 'se';
  if (nearX(cx) && nearY(box.y)) return 'n';
  if (nearX(cx) && nearY(box.y + box.h)) return 's';
  if (nearX(box.x) && nearY(cy)) return 'w';
  if (nearX(box.x + box.w) && nearY(cy)) return 'e';
  if (x >= box.x && x <= box.x + box.w && y >= box.y && y <= box.y + box.h) return 'move';
  return null;
}

app.canvas.addEventListener('mousedown', e => {
  if (!app.source) return;
  const p = getCanvasCoords(e);
  const order = [app.active, app.active === 'a' ? 'b' : 'a'];
  for (const ch of order) {
    const box = app.bbox[ch];
    if (!box) continue;
    const mode = hitTest(box, p.x, p.y);
    if (mode) {
      if (ch !== app.active) { app.active = ch; setActiveButton(); }
      app.dragging = { ch, mode, startX: p.x, startY: p.y, orig: { ...box } };
      e.preventDefault();
      render();
      return;
    }
  }
});

window.addEventListener('mousemove', e => {
  if (!app.dragging) return;
  const p = getCanvasCoords(e);
  const dx = p.x - app.dragging.startX;
  const dy = p.y - app.dragging.startY;
  const o = app.dragging.orig;
  const m = app.dragging.mode;
  const b = app.bbox[app.dragging.ch];
  if (m === 'move') {
    b.x = o.x + dx; b.y = o.y + dy;
  } else if (m === 'nw') {
    b.x = o.x + dx; b.y = o.y + dy; b.w = o.w - dx; b.h = o.h - dy;
  } else if (m === 'ne') {
    b.y = o.y + dy; b.w = o.w + dx; b.h = o.h - dy;
  } else if (m === 'sw') {
    b.x = o.x + dx; b.w = o.w - dx; b.h = o.h + dy;
  } else if (m === 'se') {
    b.w = o.w + dx; b.h = o.h + dy;
  } else if (m === 'n') {
    b.y = o.y + dy; b.h = o.h - dy;
  } else if (m === 's') {
    b.h = o.h + dy;
  } else if (m === 'w') {
    b.x = o.x + dx; b.w = o.w - dx;
  } else if (m === 'e') {
    b.w = o.w + dx;
  }
  if (b.w < 4) b.w = 4;
  if (b.h < 4) b.h = 4;
  render();
});

window.addEventListener('mouseup', () => {
  if (app.dragging) {
    upsertKeyframe(app.dragging.ch, app.bbox[app.dragging.ch]);
    app.dragging = null;
    render();
  }
});

// ===== Timeline interaction =====

const tlEl = document.getElementById('timeline');
let tlDragging = false;
async function seekFromTimeline(e) {
  const rect = tlEl.getBoundingClientRect();
  const r = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  await app.source.seek(r * app.source.duration);
  render();
}
tlEl.addEventListener('mousedown', e => { tlDragging = true; seekFromTimeline(e); });
window.addEventListener('mousemove', e => { if (tlDragging) seekFromTimeline(e); });
window.addEventListener('mouseup', () => { tlDragging = false; });

// ===== Frame stepping =====

async function stepFrame(delta) {
  if (!app.source) return;
  if (app.source.kind === 'gif' || app.source.kind === 'webp') {
    const idx = app.source._frameIdxAt(app.source.currentTime);
    const next = Math.max(0, Math.min(app.source.frames - 1, idx + delta));
    await app.source.seek(app.source.frameData[next].t);
  } else {
    const dt = delta / (app.source.fps || 30);
    await app.source.seek(app.source.currentTime + dt);
  }
  render();
}

function jumpKeyframe(direction) {
  const kfs = app.keyframes[app.active];
  if (kfs.length === 0) return;
  const t = app.source.currentTime;
  const tol = keyTolerance();
  let target = null;
  if (direction > 0) {
    target = kfs.find(k => k.t > t + tol);
  } else {
    for (let i = kfs.length - 1; i >= 0; i--) {
      if (kfs[i].t < t - tol) { target = kfs[i]; break; }
    }
  }
  if (target) app.source.seek(target.t).then(render);
}

// ===== Hotkeys =====

window.addEventListener('keydown', e => {
  if (!app.source) return;
  const tag = e.target.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  else if (e.code === 'ArrowLeft') { e.preventDefault(); stepFrame(e.shiftKey ? -10 : -1); }
  else if (e.code === 'ArrowRight') { e.preventDefault(); stepFrame(e.shiftKey ? 10 : 1); }
  else if (e.code === 'Tab') { e.preventDefault(); app.active = app.active === 'a' ? 'b' : 'a'; setActiveButton(); render(); }
  else if (e.code === 'KeyK') { e.preventDefault(); upsertKeyframe(app.active, app.bbox[app.active]); render(); }
  else if (e.code === 'Delete' || e.code === 'Backspace') { e.preventDefault(); removeKeyframeAt(app.active); render(); }
  else if (e.code === 'Digit1') { e.preventDefault(); jumpKeyframe(-1); }
  else if (e.code === 'Digit2') { e.preventDefault(); jumpKeyframe(+1); }
});

// ===== UI =====

function setActiveButton() {
  document.getElementById('activeA').classList.toggle('active', app.active === 'a');
  document.getElementById('activeB').classList.toggle('active', app.active === 'b');
}

document.getElementById('activeA').addEventListener('click', () => { app.active = 'a'; setActiveButton(); render(); });
document.getElementById('activeB').addEventListener('click', () => { app.active = 'b'; setActiveButton(); render(); });
document.getElementById('addKf').addEventListener('click', () => { upsertKeyframe(app.active, app.bbox[app.active]); render(); });
document.getElementById('delKf').addEventListener('click', () => { removeKeyframeAt(app.active); render(); });
document.getElementById('prevBtn').addEventListener('click', () => stepFrame(-1));
document.getElementById('nextBtn').addEventListener('click', () => stepFrame(+1));

function applySizeInput(field) {
  const b = app.bbox[app.active];
  if (!b) return;
  const v = parseFloat(document.getElementById(field === 'w' ? 'wInput' : 'hInput').value);
  if (!(v >= 2)) return;
  const cx = b.x + b.w / 2;
  const cy = b.y + b.h / 2;
  if (field === 'w') { b.w = v; b.x = cx - v / 2; }
  else                { b.h = v; b.y = cy - v / 2; }
  upsertKeyframe(app.active, b);
  render();
}
document.getElementById('wInput').addEventListener('change', () => applySizeInput('w'));
document.getElementById('hInput').addEventListener('change', () => applySizeInput('h'));
document.getElementById('wInput').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); applySizeInput('w'); }});
document.getElementById('hInput').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); applySizeInput('h'); }});

document.getElementById('applySizeAll').addEventListener('click', () => {
  const b = app.bbox[app.active];
  if (!b) return;
  const kfs = app.keyframes[app.active];
  for (const k of kfs) {
    const cx = k.x + k.w / 2;
    const cy = k.y + k.h / 2;
    k.w = b.w; k.h = b.h;
    k.x = cx - b.w / 2;
    k.y = cy - b.h / 2;
  }
  render();
});

const fpsInput = document.getElementById('fpsInput');
fpsInput.addEventListener('change', () => {
  const v = parseFloat(fpsInput.value);
  if (v > 0 && app.source && app.source.kind === 'video') {
    app.source.setFps(v);
    render();
  }
});

let playing = false;
function togglePlay() {
  if (!app.source) return;
  const btn = document.getElementById('playBtn');
  if (playing) {
    app.source.pause(); playing = false; btn.textContent = 'Play';
  } else {
    app.source.play();
    playing = true; btn.textContent = 'Pause';
    if (app.source.kind === 'video') {
      const tick = () => {
        if (!playing) return;
        render();
        if (app.source.isPaused) { playing = false; btn.textContent = 'Play'; return; }
        requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    }
  }
}
document.getElementById('playBtn').addEventListener('click', togglePlay);

// ===== Export =====

document.getElementById('exportBtn').addEventListener('click', () => {
  const data = {
    source: app.source.file.name,
    kind: app.source.kind,
    width: app.source.width,
    height: app.source.height,
    fps: app.source.fps,
    duration: app.source.duration,
    frames: app.source.frames,
    keyframes: app.keyframes,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = app.source.file.name.replace(/\.[^.]+$/, '') + '.json';
  a.click();
  URL.revokeObjectURL(url);
});

// ===== File loading =====

function setStatus(msg, isErr) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.classList.toggle('err', !!isErr);
}

async function loadFile(file) {
  setStatus('Loading…');
  try {
    const isGif = file.type === 'image/gif' || /\.gif$/i.test(file.name);
    const isWebp = file.type === 'image/webp' || /\.webp$/i.test(file.name);
    if (isGif) app.source = new GifSource(file);
    else if (isWebp) app.source = new WebpSource(file);
    else app.source = new VideoSource(file);
    await app.source.load();

    app.canvas.width = app.source.width;
    app.canvas.height = app.source.height;
    app.keyframes = { a: [], b: [] };
    app.bbox = { a: null, b: null };

    fpsInput.value = app.source.fps.toFixed(2);
    fpsInput.disabled = app.source.kind !== 'video';

    document.getElementById('workspace').style.display = '';
    document.getElementById('dropZone').textContent = `Loaded: ${file.name} — ${app.source.width}×${app.source.height}, ${app.source.duration.toFixed(2)}s, ${app.source.frames} frames`;

    await app.source.seek(0);
    render();
    const note = app.source.kind === 'video' ? '' : `${app.source.kind.toUpperCase()} frames pre-rendered.`;
    setStatus('Ready. ' + note);
  } catch (err) {
    console.error(err);
    setStatus('Error: ' + err.message, true);
  }
}

const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
});
dz.addEventListener('click', () => {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'video/*,image/gif,image/webp';
  inp.onchange = () => { if (inp.files[0]) loadFile(inp.files[0]); };
  inp.click();
});

</script>
