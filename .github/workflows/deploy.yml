name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests and deploy immediately'
        required: false
        default: 'false'
        type: boolean

jobs:
  test:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_tests == 'false' }}

    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN_TEST || '1234567890:AAFabcdefghijklmnopqrstuvwxyz12345' }}
        run: |
          docker compose -f docker-compose.test.yml --profile test run --rm test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: |
      always() && (
        needs.test.result == 'success' ||
        needs.test.result == 'skipped'
      )

    steps:
      - name: Connect & Deploy
        uses: appleboy/ssh-action@v1.0.0
        env:
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: REMOTE_PATH
          script: |
            cd $REMOTE_PATH
            git pull
            sudo make down
            sudo make prod
